# =================================================================
# 三、Preflop 面对RFI的BB防守策略
# 场景：BB面对不同位置的open，计算赔率后决定防守范围
# =================================================================
bb_defense:
  # BB面对open时的最低跟注赔率阈值
  # pot_odds_threshold: 跟注所需的最低胜率(考虑赔率后)
  facing_UTG: 
    min_call_equity: 0.35   # 面对紧范围需要更高胜率
    defense_freq: 0.45      # 总防守频率(3bet+call)
  facing_MP:
    min_call_equity: 0.32
    defense_freq: 0.50
  facing_CO:
    min_call_equity: 0.28
    defense_freq: 0.55
  facing_BTN:
    min_call_equity: 0.25   # 面对宽范围可更低
    defense_freq: 0.60
  facing_SB:
    min_call_equity: 0.30
    defense_freq: 0.55

# =================================================================
# 四、Postflop 行动频率表
# 基于 equity bucket 的GTO近似策略
# bucket: 胜率区间
# actions: 各行动的概率分布 + 尺度
# =================================================================
postflop:
  # 翻牌 (Flop) - 单挑底池
  flop_heads_up:
    # [raise_prob, call_prob, fold_prob, raise_size_pot_ratio]
    # bet_type: 主动下注场景; facing_bet: 面对下注场景
    
    # 超强牌 (equity > 0.80): 大量价值下注
    monster:
      equity_range: [0.80, 1.00]
      bet_first: [0.80, 0.15, 0.05, 0.75]   # 主动下注: 75%底池
      facing_bet: [0.60, 0.35, 0.05, 1.0]    # 面对下注: 加注满池
      facing_raise: [0.70, 0.25, 0.05, 1.0]  # 面对加注: 反加满池

    # 强牌 (equity 0.65-0.80): 价值下注
    strong:
      equity_range: [0.65, 0.80]
      bet_first: [0.70, 0.25, 0.05, 0.66]   # 2/3底池
      facing_bet: [0.25, 0.65, 0.10, 0.75]   # 多数跟注
      facing_raise: [0.15, 0.55, 0.30, 0.75] # 部分弃牌给大加注

    # 中等牌 (equity 0.50-0.65): 控池
    medium:
      equity_range: [0.50, 0.65]
      bet_first: [0.30, 0.50, 0.20, 0.50]   # 小注控池
      facing_bet: [0.05, 0.55, 0.40, 0.50]   # 多数跟注但可弃牌
      facing_raise: [0.02, 0.25, 0.73, 0.50] # 大部分弃牌

    # 弱成牌 (equity 0.35-0.50): 偏弃牌
    weak:
      equity_range: [0.35, 0.50]
      bet_first: [0.15, 0.35, 0.50, 0.33]   # 偶尔bluff
      facing_bet: [0.02, 0.30, 0.68, 0.33]   # 多数弃牌
      facing_raise: [0.0, 0.10, 0.90, 0.33]  # 几乎弃牌

    # 空气 (equity < 0.35): bluff或弃牌
    air:
      equity_range: [0.00, 0.35]
      bet_first: [0.20, 0.10, 0.70, 0.50]   # bluff频率
      facing_bet: [0.02, 0.08, 0.90, 0.50]   # 几乎弃牌
      facing_raise: [0.0, 0.02, 0.98, 0.50]  # 弃牌

  # 翻牌 (Flop) - 多人底池
  flop_multi_way:
    monster:
      equity_range: [0.80, 1.00]
      bet_first: [0.85, 0.10, 0.05, 0.80]   # 多人下注更大
      facing_bet: [0.65, 0.30, 0.05, 1.0]
    strong:
      equity_range: [0.65, 0.80]
      bet_first: [0.60, 0.30, 0.10, 0.75]
      facing_bet: [0.15, 0.65, 0.20, 0.66]
    medium:
      equity_range: [0.50, 0.65]
      bet_first: [0.15, 0.45, 0.40, 0.50]
      facing_bet: [0.02, 0.35, 0.63, 0.50]   # 多人池更紧
    weak:
      equity_range: [0.35, 0.50]
      bet_first: [0.05, 0.25, 0.70, 0.33]
      facing_bet: [0.0, 0.15, 0.85, 0.33]
    air:
      equity_range: [0.00, 0.35]
      bet_first: [0.05, 0.05, 0.90, 0.50]   # 多人bluff极少
      facing_bet: [0.0, 0.05, 0.95, 0.50]

  # 转牌 (Turn)
  turn_heads_up:
    monster:
      equity_range: [0.80, 1.00]
      bet_first: [0.85, 0.10, 0.05, 0.75]
      facing_bet: [0.65, 0.30, 0.05, 1.0]
    strong:
      equity_range: [0.65, 0.80]
      bet_first: [0.70, 0.25, 0.05, 0.66]
      facing_bet: [0.20, 0.65, 0.15, 0.75]
    medium:
      equity_range: [0.50, 0.65]
      bet_first: [0.25, 0.45, 0.30, 0.50]
      facing_bet: [0.03, 0.42, 0.55, 0.50]
    weak:
      equity_range: [0.35, 0.50]
      bet_first: [0.10, 0.30, 0.60, 0.50]
      facing_bet: [0.0, 0.20, 0.80, 0.50]
    air:
      equity_range: [0.00, 0.35]
      bet_first: [0.15, 0.05, 0.80, 0.66]   # turn bluff更大
      facing_bet: [0.0, 0.05, 0.95, 0.66]

  # 河牌 (River)
  river_heads_up:
    monster:
      equity_range: [0.80, 1.00]
      bet_first: [0.85, 0.10, 0.05, 0.75]
      facing_bet: [0.70, 0.25, 0.05, 1.0]
    strong:
      equity_range: [0.65, 0.80]
      bet_first: [0.65, 0.30, 0.05, 0.66]
      facing_bet: [0.20, 0.65, 0.15, 0.75]
    medium:
      equity_range: [0.50, 0.65]
      bet_first: [0.20, 0.50, 0.30, 0.50]
      facing_bet: [0.03, 0.47, 0.50, 0.50]   # 河牌更精确的跟/弃
    weak:
      equity_range: [0.35, 0.50]
      bet_first: [0.05, 0.25, 0.70, 0.50]    # 偶尔薄价值
      facing_bet: [0.0, 0.20, 0.80, 0.50]
    air:
      equity_range: [0.00, 0.35]
      bet_first: [0.10, 0.05, 0.85, 0.66]    # 河牌bluff
      facing_bet: [0.0, 0.03, 0.97, 0.66]

# =================================================================
# 五、Postflop 特殊场景策略
# =================================================================
postflop_special:
  # 听牌 (Draw) 的半诈唬频率
  draws:
    flush_draw_flop:
      # 9个outs ~35%胜率
      bet_first: [0.45, 0.40, 0.15, 0.66]   # 高频半诈唬
      facing_bet: [0.20, 0.55, 0.25, 0.75]
    flush_draw_turn:
      bet_first: [0.35, 0.35, 0.30, 0.66]
      facing_bet: [0.10, 0.50, 0.40, 0.75]
    oesd_flop:
      # 8个outs ~32%胜率
      bet_first: [0.30, 0.40, 0.30, 0.50]
      facing_bet: [0.10, 0.50, 0.40, 0.66]
    gutshot_flop:
      # 4个outs ~17%胜率
      bet_first: [0.15, 0.30, 0.55, 0.50]
      facing_bet: [0.05, 0.30, 0.65, 0.50]

  # SPR (Stack-to-Pot Ratio) 调整系数
  spr_adjustment:
    # SPR < 2: 快打，减少诈唬
    low_spr:
      bluff_multiplier: 0.5
      value_bet_multiplier: 1.2
      call_threshold_adjust: -0.08
    # SPR 2-6: 标准
    mid_spr:
      bluff_multiplier: 1.0
      value_bet_multiplier: 1.0
      call_threshold_adjust: 0.0
    # SPR > 6: 可以更多诈唬
    high_spr:
      bluff_multiplier: 1.3
      value_bet_multiplier: 0.9
      call_threshold_adjust: 0.05

  # 位置优势调整
  position_adjustment:
    in_position:
      bluff_multiplier: 1.2      # IP更多bluff
      value_bet_multiplier: 1.0
      bet_size_multiplier: 0.9    # IP尺度略小
    out_of_position:
      bluff_multiplier: 0.8       # OOP少bluff
      value_bet_multiplier: 1.1
      bet_size_multiplier: 1.1    # OOP尺度略大
