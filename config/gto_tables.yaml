# =================================================================
# 二、Preflop 面对RFI的应对策略 (vs Open)
# 场景：对手已开池加注，我们需要决定3bet/call/fold
# =================================================================
preflop_vs_open:
  # 按面对的位置分组 (facing_UTG 表示对手从UTG开池)
  # 格式: hand: [3bet_prob, call_prob, fold_prob, 3bet_size_x]
  # 3bet_size_x: 相对手open尺度的倍数 (通常3x OOP, 2.5x IP)
  
  facing_UTG:
    # IP位置 (BTN/CO) 的应对
    IP:
      AA: [0.80, 0.20, 0.0, 3.0]   # 偶尔慢打AA
      KK: [0.75, 0.25, 0.0, 3.0]
      QQ: [0.60, 0.35, 0.05, 3.0]
      JJ: [0.35, 0.55, 0.10, 3.0]
      TT: [0.15, 0.55, 0.30, 3.0]
      AKs: [0.60, 0.35, 0.05, 3.0]
      AKo: [0.50, 0.40, 0.10, 3.0]
      AQs: [0.35, 0.40, 0.25, 3.0]
      AQo: [0.15, 0.35, 0.50, 3.0]
      AJs: [0.20, 0.30, 0.50, 3.0]
      99: [0.10, 0.40, 0.50, 3.0]
      88: [0.05, 0.30, 0.65, 3.0]
      KQs: [0.15, 0.30, 0.55, 3.0]
      # 3bet bluff 范围
      A5s: [0.20, 0.10, 0.70, 3.0]
      A4s: [0.15, 0.10, 0.75, 3.0]
      A2s: [0.10, 0.05, 0.85, 3.0]

    # OOP位置 (BB) 的应对
    BB:
      AA: [0.70, 0.30, 0.0, 3.5]   # OOP 3bet尺度更大
      KK: [0.65, 0.35, 0.0, 3.5]
      QQ: [0.50, 0.45, 0.05, 3.5]
      JJ: [0.30, 0.55, 0.15, 3.5]
      TT: [0.15, 0.55, 0.30, 3.5]
      99: [0.05, 0.50, 0.45, 3.5]
      88: [0.05, 0.40, 0.55, 3.5]
      AKs: [0.55, 0.40, 0.05, 3.5]
      AKo: [0.45, 0.45, 0.10, 3.5]
      AQs: [0.30, 0.40, 0.30, 3.5]
      AQo: [0.15, 0.35, 0.50, 3.5]
      AJs: [0.15, 0.25, 0.60, 3.5]
      KQs: [0.15, 0.30, 0.55, 3.5]
      # BB防守: 合适赔率下宽跟注
      ATs: [0.10, 0.35, 0.55, 3.5]
      A5s: [0.15, 0.15, 0.70, 3.5]
      77: [0.05, 0.35, 0.60, 3.5]
      66: [0.05, 0.25, 0.70, 3.5]

  facing_CO:
    IP:  # BTN
      AA: [0.85, 0.15, 0.0, 2.5]
      KK: [0.80, 0.20, 0.0, 2.5]
      QQ: [0.70, 0.28, 0.02, 2.5]
      JJ: [0.50, 0.45, 0.05, 2.5]
      TT: [0.30, 0.55, 0.15, 2.5]
      99: [0.20, 0.55, 0.25, 2.5]
      88: [0.10, 0.50, 0.40, 2.5]
      AKs: [0.70, 0.28, 0.02, 2.5]
      AKo: [0.60, 0.35, 0.05, 2.5]
      AQs: [0.50, 0.35, 0.15, 2.5]
      AQo: [0.30, 0.40, 0.30, 2.5]
      AJs: [0.30, 0.35, 0.35, 2.5]
      AJo: [0.15, 0.30, 0.55, 2.5]
      KQs: [0.25, 0.40, 0.35, 2.5]
      KQo: [0.10, 0.25, 0.65, 2.5]
      KJs: [0.20, 0.30, 0.50, 2.5]
      QJs: [0.10, 0.25, 0.65, 2.5]
      JTs: [0.10, 0.25, 0.65, 2.5]
      # 3bet bluff
      A5s: [0.30, 0.10, 0.60, 2.5]
      A4s: [0.25, 0.10, 0.65, 2.5]
      A2s: [0.15, 0.05, 0.80, 2.5]
      87s: [0.10, 0.15, 0.75, 2.5]

    BB:
      AA: [0.75, 0.25, 0.0, 3.0]
      KK: [0.70, 0.30, 0.0, 3.0]
      QQ: [0.55, 0.42, 0.03, 3.0]
      JJ: [0.40, 0.50, 0.10, 3.0]
      TT: [0.25, 0.55, 0.20, 3.0]
