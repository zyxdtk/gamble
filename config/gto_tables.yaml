# GTO 预计算策略表
# 基于PioSolver/GTO+标准GTO解的数据整理
# 格式说明：
#   - 行动概率: raise/call/fold 各 0.0-1.0，三者之和=1.0
#   - raise_size: 相对底池的倍数 (0.5=半池, 1.0=满池)
#   - 3bet_size: 面对open时的3bet尺度 (相对对手open的倍数)

# =================================================================
# 一、Preflop RFI (Raise First In) 策略表
# 场景：无人加注，我们第一个开池
# =================================================================
preflop_rfi:
  # 各位置的RFI范围 + 加注概率 + 尺度
  # 格式: hand: [raise_prob, call_prob, fold_prob, raise_size_bb]
  
  UTG:
    # Tier 1: 100% raise
    AA: [1.0, 0.0, 0.0, 2.5]
    KK: [1.0, 0.0, 0.0, 2.5]
    QQ: [1.0, 0.0, 0.0, 2.5]
    JJ: [1.0, 0.0, 0.0, 2.5]
    AKs: [1.0, 0.0, 0.0, 2.5]
    AKo: [1.0, 0.0, 0.0, 2.5]
    # Tier 2: 高频 raise
    TT: [1.0, 0.0, 0.0, 2.5]
    AQs: [1.0, 0.0, 0.0, 2.5]
    AQo: [0.95, 0.0, 0.05, 2.5]
    AJs: [0.90, 0.0, 0.10, 2.5]
    KQs: [0.85, 0.0, 0.15, 2.5]
